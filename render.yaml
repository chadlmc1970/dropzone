# Render Blueprint for DropZone DJ Mixing App
# Auto-deploy: Push to main branch triggers deployment

services:
  # Backend API
  - type: web
    name: dropzone-api
    runtime: docker
    repo: https://github.com/chadlmc1970/dropzone.git
    branch: main
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    region: ohio
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually in Render Dashboard
      - key: SECRET_KEY
        generateValue: true  # Auto-generate secure secret
      - key: JWT_SECRET_KEY
        generateValue: true  # Auto-generate secure secret
      - key: AUTH0_DOMAIN
        sync: false
      - key: AUTH0_CLIENT_ID
        sync: false
      - key: AUTH0_CLIENT_SECRET
        sync: false
      - key: AUTH0_AUDIENCE
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: https://dropzone-api.onrender.com/api/auth/callback/spotify
      - key: CORS_ORIGINS
        value: https://dropzone-dashboard.onrender.com
      - key: FRONTEND_URL
        value: https://dropzone-dashboard.onrender.com

  # Web Frontend
  - type: web
    name: dropzone-dashboard
    runtime: node
    repo: https://github.com/chadlmc1970/dropzone.git
    branch: main
    rootDir: ./web
    region: ohio
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://dropzone-api.onrender.com
      - key: NEXT_PUBLIC_AUTH0_DOMAIN
        sync: false
      - key: NEXT_PUBLIC_AUTH0_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_AUTH0_CALLBACK_URL
        value: https://dropzone-dashboard.onrender.com/callback
      - key: NODE_ENV
        value: production
